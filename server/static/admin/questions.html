<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>题库管理 - 管理后台</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <div id="sidebar-container"></div>
    
    <div class="main-content">
      <div class="page-header">
        <h2>📝 题库管理</h2>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn btn-primary" onclick="showAddModal()">➕ 添加题目</button>
          <button class="btn btn-outline" onclick="downloadTemplate()">📥 下载导入模板</button>
          <label class="btn btn-accent" style="cursor:pointer;">
            📤 导入Excel
            <input type="file" accept=".xlsx,.xls" onchange="importExcel(event)" style="display:none;">
          </label>
        </div>
      </div>

      <div class="card">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>年级</th>
                <th>类型</th>
                <th>题目</th>
                <th>答案</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="questions-table"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- 添加/编辑题目弹窗 -->
  <div class="modal-overlay hidden" id="question-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title">添加题目</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <form id="question-form" onsubmit="return saveQuestion(event)">
        <input type="hidden" id="q-id">
        <div class="form-group">
          <label class="form-label">年级分类</label>
          <select class="form-select" id="q-category" required>
            <option value="primary_low">小学低年级（1-3年级）</option>
            <option value="primary_high">小学高年级（4-6年级）</option>
            <option value="middle">初中（7-9年级）</option>
            <option value="high">高中（10-12年级）</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">题目类型</label>
          <select class="form-select" id="q-type" required onchange="updateOptionInputs()">
            <option value="single">单选题</option>
            <option value="multiple">多选题</option>
            <option value="judge">判断题</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">题目内容</label>
          <textarea class="form-textarea" id="q-question" rows="2" required placeholder="请输入题目"></textarea>
        </div>
        <div class="form-group" id="options-group">
          <label class="form-label">选项（用换行分隔）</label>
          <textarea class="form-textarea" id="q-options" rows="4" placeholder="选项A&#10;选项B&#10;选项C&#10;选项D"></textarea>
        </div>
        <div class="form-group">
          <label class="form-label">正确答案</label>
          <input type="text" class="form-input" id="q-answer" required placeholder="如：A 或 ABC">
        </div>
        <div class="form-group">
          <label class="form-label">解析</label>
          <textarea class="form-textarea" id="q-explanation" rows="2" placeholder="请输入答案解析"></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="modal-submit-btn">添加</button>
      </form>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script>
    if (!AdminAuth.checkAuth()) location.href = 'login.html';

    async function loadQuestions() {
      try {
        const questions = await AdminAPI.get('/admin/api/questions');
        const tbody = document.getElementById('questions-table');
        
        if (questions.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">暂无题目</td></tr>';
          return;
        }

        tbody.innerHTML = questions.map(q => `
          <tr>
            <td>${q.id}</td>
            <td>${AdminUtils.getGradeLabel(q.category)}</td>
            <td>${AdminUtils.getQuestionTypeLabel(q.type)}</td>
            <td style="max-width:300px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${q.question}">${q.question}</td>
            <td>${q.answer}</td>
            <td>
              <button class="btn btn-outline btn-sm" onclick="editQuestion(${q.id})">编辑</button>
              <button class="btn btn-danger btn-sm" onclick="deleteQuestion(${q.id})">删除</button>
            </td>
          </tr>
        `).join('');
      } catch (err) { console.error(err); }
    }

    function updateOptionInputs() {
      const type = document.getElementById('q-type').value;
      document.getElementById('options-group').classList.toggle('hidden', type === 'judge');
    }

    function showAddModal() {
      document.getElementById('modal-title').textContent = '添加题目';
      document.getElementById('modal-submit-btn').textContent = '添加';
      document.getElementById('q-id').value = '';
      document.getElementById('question-form').reset();
      document.getElementById('question-modal').classList.remove('hidden');
    }

    async function editQuestion(id) {
      try {
        const questions = await AdminAPI.get('/admin/api/questions');
        const q = questions.find(q => q.id === id);
        if (!q) return;

        document.getElementById('modal-title').textContent = '编辑题目';
        document.getElementById('modal-submit-btn').textContent = '保存';
        document.getElementById('q-id').value = q.id;
        document.getElementById('q-category').value = q.category;
        document.getElementById('q-type').value = q.type;
        document.getElementById('q-question').value = q.question;
        document.getElementById('q-answer').value = q.answer;
        document.getElementById('q-explanation').value = q.explanation || '';
        updateOptionInputs();

        const opts = typeof q.options === 'string' ? JSON.parse(q.options) : q.options;
        if (opts && opts.length > 0) {
          document.getElementById('q-options').value = opts.join('\n');
        }

        document.getElementById('question-modal').classList.remove('hidden');
      } catch (err) { AdminUtils.showToast('加载失败', 'error'); }
    }

    function closeModal() {
      document.getElementById('question-modal').classList.add('hidden');
      document.getElementById('question-form').reset();
      document.getElementById('q-id').value = '';
    }

    async function saveQuestion(event) {
      event.preventDefault();
      
      const id = document.getElementById('q-id').value;
      const category = document.getElementById('q-category').value;
      const type = document.getElementById('q-type').value;
      const question = document.getElementById('q-question').value.trim();
      const optionsText = document.getElementById('q-options').value.trim();
      const answer = document.getElementById('q-answer').value.trim().toUpperCase();
      const explanation = document.getElementById('q-explanation').value.trim();

      let options = [];
      if (type === 'judge') {
        options = ['正确', '错误'];
      } else {
        options = optionsText.split('\n').filter(o => o.trim());
      }

      try {
        if (id) {
          await AdminAPI.put(`/admin/api/questions/${id}`, { category, type, question, options, answer, explanation });
          AdminUtils.showToast('修改成功');
        } else {
          await AdminAPI.post('/admin/api/questions', { category, type, question, options, answer, explanation });
          AdminUtils.showToast('添加成功');
        }
        closeModal();
        loadQuestions();
      } catch (err) { AdminUtils.showToast('操作失败', 'error'); }
      return false;
    }

    async function deleteQuestion(id) {
      if (!confirm('确定要删除这道题吗？')) return;
      try {
        await AdminAPI.delete(`/admin/api/questions/${id}`);
        AdminUtils.showToast('删除成功');
        loadQuestions();
      } catch (err) { AdminUtils.showToast('删除失败', 'error'); }
    }

    function downloadTemplate() {
      fetch('/admin/api/questions/template', {
        headers: { 'Authorization': `Bearer ${AdminAuth.getToken()}` }
      })
      .then(res => {
        if (!res.ok) throw new Error('下载失败');
        return res.blob();
      })
      .then(blob => {
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = '题库导入模板.xlsx';
        a.click();
        URL.revokeObjectURL(url);
        AdminUtils.showToast('模板下载成功');
      })
      .catch(err => AdminUtils.showToast('下载失败: ' + err.message, 'error'));
    }

    async function importExcel(event) {
      const file = event.target.files[0];
      if (!file) return;
      
      if (!confirm(`确认导入文件 "${file.name}"？`)) {
        event.target.value = '';
        return;
      }
      
      const formData = new FormData();
      formData.append('file', file);
      
      try {
        const res = await fetch('/admin/api/questions/import', {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${AdminAuth.getToken()}` },
          body: formData
        });
        const result = await res.json();
        
        if (result.success) {
          let msg = `成功导入 ${result.imported} 题`;
          if (result.errors.length > 0) {
            msg += `，${result.errors.length} 条错误：\n` + result.errors.slice(0, 5).join('\n');
            if (result.errors.length > 5) msg += `\n...等共${result.errors.length}条错误`;
          }
          AdminUtils.showToast(msg, result.errors.length > 0 ? 'error' : 'success');
          loadQuestions();
        } else {
          AdminUtils.showToast(result.error || '导入失败', 'error');
        }
      } catch (err) {
        AdminUtils.showToast('导入失败: ' + err.message, 'error');
      }
      
      event.target.value = '';
    }

    loadQuestions();
  </script>
</body>
</html>
