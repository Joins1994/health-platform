<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>奖品管理 - 管理后台</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <div id="sidebar-container"></div>
    
    <div class="main-content">
      <div class="page-header">
        <h2>🎁 奖品管理</h2>
        <button class="btn btn-primary" onclick="showAddModal()">➕ 添加奖品</button>
      </div>

      <div class="card">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>奖品名称</th>
                <th>描述</th>
                <th>总量</th>
                <th>剩余</th>
                <th>概率权重</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="prizes-table"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- 添加/编辑奖品弹窗 -->
  <div class="modal-overlay hidden" id="prize-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modal-title">添加奖品</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <form id="prize-form" onsubmit="return savePrize(event)">
        <input type="hidden" id="prize-id">
        <div class="form-group">
          <label class="form-label">奖品名称</label>
          <input type="text" class="form-input" id="prize-name" required placeholder="如：健康大礼包">
        </div>
        <div class="form-group">
          <label class="form-label">奖品描述</label>
          <input type="text" class="form-input" id="prize-desc" placeholder="如：包含健康手册、文具套装">
        </div>
        <div class="form-group">
          <label class="form-label">数量</label>
          <input type="number" class="form-input" id="prize-quantity" required min="1" placeholder="奖品数量">
        </div>
        <div class="form-group">
          <label class="form-label">概率权重</label>
          <input type="number" class="form-input" id="prize-probability" required min="0" max="1" step="0.01" placeholder="0-1之间，如0.3">
          <div class="text-sm text-muted mt-1">0-1之间的小数，所有奖品权重之和建议为1</div>
        </div>
        <button type="submit" class="btn btn-primary btn-block" id="save-btn">保存</button>
      </form>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script>
    if (!AdminAuth.checkAuth()) {
      location.href = 'login.html';
    }

    async function loadPrizes() {
      try {
        const prizes = await AdminAPI.get('/admin/api/prizes');
        const tbody = document.getElementById('prizes-table');
        
        if (prizes.length === 0) {
          tbody.innerHTML = '<tr><td colspan="7" class="text-center text-muted">暂无奖品</td></tr>';
          return;
        }

        tbody.innerHTML = prizes.map(p => `
          <tr>
            <td>${p.id}</td>
            <td>${p.name}</td>
            <td>${p.description || '-'}</td>
            <td>${p.quantity}</td>
            <td><span class="${p.remaining === 0 ? 'text-error' : 'text-primary'}" style="font-weight:600;">${p.remaining}</span></td>
            <td>${p.probability}</td>
            <td>
              <button class="btn btn-primary btn-sm mr-1" onclick="editPrize(${p.id})">编辑</button>
              <button class="btn btn-danger btn-sm" onclick="deletePrize(${p.id})">删除</button>
            </td>
          </tr>
        `).join('');
      } catch (err) {
        console.error('加载奖品失败:', err);
      }
    }

    function showAddModal() {
      document.getElementById('prize-id').value = '';
      document.getElementById('modal-title').textContent = '添加奖品';
      document.getElementById('prize-form').reset();
      document.getElementById('prize-modal').classList.remove('hidden');
    }

    async function editPrize(id) {
      try {
        const prizes = await AdminAPI.get('/admin/api/prizes');
        const prize = prizes.find(p => p.id === id);
        if (!prize) return;

        document.getElementById('prize-id').value = prize.id;
        document.getElementById('modal-title').textContent = '编辑奖品';
        document.getElementById('prize-name').value = prize.name;
        document.getElementById('prize-desc').value = prize.description || '';
        document.getElementById('prize-quantity').value = prize.quantity;
        document.getElementById('prize-probability').value = prize.probability;
        document.getElementById('prize-modal').classList.remove('hidden');
      } catch (err) {
        AdminUtils.showToast('加载失败', 'error');
      }
    }

    async function savePrize(event) {
      event.preventDefault();
      
      const id = document.getElementById('prize-id').value;
      const name = document.getElementById('prize-name').value.trim();
      const description = document.getElementById('prize-desc').value.trim();
      const quantity = parseInt(document.getElementById('prize-quantity').value);
      const probability = parseFloat(document.getElementById('prize-probability').value);

      try {
        if (id) {
          await AdminAPI.put(`/admin/api/prizes/${id}`, { name, description, quantity, probability });
        } else {
          await AdminAPI.post('/admin/api/prizes', { name, description, quantity, probability });
        }
        
        AdminUtils.showToast('保存成功');
        closeModal();
        loadPrizes();
      } catch (err) {
        AdminUtils.showToast('保存失败', 'error');
      }

      return false;
    }

    async function deletePrize(id) {
      if (!confirm('确定要删除这个奖品吗？')) return;
      
      try {
        await AdminAPI.delete(`/admin/api/prizes/${id}`);
        AdminUtils.showToast('删除成功');
        loadPrizes();
      } catch (err) {
        AdminUtils.showToast('删除失败', 'error');
      }
    }

    function closeModal() {
      document.getElementById('prize-modal').classList.add('hidden');
    }

    loadPrizes();
  </script>
</body>
</html>
