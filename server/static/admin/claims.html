<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>领奖核销 - 管理后台</title>
  <link rel="stylesheet" href="css/admin.css">
</head>
<body>
  <div class="admin-layout">
    <div id="sidebar-container"></div>
    
    <div class="main-content">
      <div class="page-header">
        <h2>🎫 领奖核销</h2>
        <div style="display:flex;gap:8px;">
          <button class="btn btn-primary btn-sm" onclick="loadClaims('pending',1)">待核销</button>
          <button class="btn btn-outline btn-sm" onclick="loadClaims('claimed',1)">已核销</button>
          <button class="btn btn-outline btn-sm" onclick="loadClaims('rejected',1)">已拒绝</button>
          <button class="btn btn-outline btn-sm" onclick="exportClaims()">📥 导出CSV</button>
        </div>
      </div>

      <div class="card">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>ID</th>
                <th>姓名</th>
                <th>学校</th>
                <th>年级</th>
                <th>班级</th>
                <th>电话</th>
                <th>奖品</th>
                <th>兑换码</th>
                <th>中奖时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="claims-table"></tbody>
          </table>
        </div>
        <div id="pagination"></div>
      </div>
    </div>
  </div>

  <script src="js/admin.js"></script>
  <script>
    if (!AdminAuth.checkAuth()) location.href = 'login.html';

    let currentStatus = 'pending';

    async function loadClaims(status, page = 1) {
      currentStatus = status;
      try {
        const result = await AdminAPI.get(`/admin/api/claims?status=${status}&page=${page}&limit=20`);
        const { data: records, total, limit } = result;
        const tbody = document.getElementById('claims-table');
        
        if (records.length === 0) {
          tbody.innerHTML = '<tr><td colspan="10" class="text-center text-muted">暂无记录</td></tr>';
        } else {
          tbody.innerHTML = records.map(r => `
            <tr>
              <td>${r.id}</td>
              <td>${r.name || '匿名'}</td>
              <td>${r.school || '-'}</td>
              <td>${r.grade || '-'}</td>
              <td>${r.class || '-'}</td>
              <td>${r.phone || '-'}</td>
              <td><span class="badge badge-accent">${r.prize}</span></td>
              <td style="font-family:monospace;font-weight:600;color:var(--primary);">${r.redeem_code || '-'}</td>
              <td>${AdminUtils.formatDate(r.created_at)}</td>
              <td>
                ${status === 'pending' ? `
                  <button class="btn btn-primary btn-sm" onclick="claimPrize(${r.id})">核销</button>
                  <button class="btn btn-outline btn-sm" style="color:#e74c3c;border-color:#e74c3c;" onclick="rejectPrize(${r.id})">拒绝</button>
                ` : `
                  <span class="badge ${status === 'claimed' ? 'badge-accent' : 'badge-error'}">${status === 'claimed' ? '已核销' : '已拒绝'}</span>
                  ${r.claimed_at ? `<br><span class="text-sm text-muted">${AdminUtils.formatDate(r.claimed_at)}</span>` : ''}
                `}
              </td>
            </tr>
          `).join('');
        }
        AdminUtils.renderPagination('pagination', total, page, limit, 'loadClaimsPage');
      } catch (err) { console.error(err); }
    }

    function loadClaimsPage(page) { loadClaims(currentStatus, page); }

    async function claimPrize(id) {
      if (!confirm('确认核销该奖品？')) return;
      try {
        await AdminAPI.put(`/admin/api/claims/${id}`, { action: 'claim' });
        AdminUtils.showToast('核销成功');
        loadClaims(currentStatus, 1);
      } catch (err) { AdminUtils.showToast('核销失败', 'error'); }
    }

    async function rejectPrize(id) {
      if (!confirm('确认拒绝该领奖申请？')) return;
      try {
        await AdminAPI.put(`/admin/api/claims/${id}`, { action: 'reject' });
        AdminUtils.showToast('已拒绝');
        loadClaims(currentStatus, 1);
      } catch (err) { AdminUtils.showToast('操作失败', 'error'); }
    }

    async function exportClaims() {
      try {
        const result = await AdminAPI.get(`/admin/api/claims?status=${currentStatus}&page=1&limit=9999`);
        AdminUtils.exportCSV('核销记录', ['ID','姓名','学校','年级','班级','电话','奖品','兑换码','状态','中奖时间'],
          result.data.map(r => [r.id, r.name, r.school, r.grade, r.class, r.phone, r.prize, r.redeem_code, r.prize_status, r.created_at]));
      } catch (err) { AdminUtils.showToast('导出失败', 'error'); }
    }

    loadClaims('pending');
  </script>
</body>
</html>
