<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>登录 - 健康成长互动平台</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-content">
    <div class="header">
      <h1>🌱 健康成长互动平台</h1>
      <p>中山市中小学生健康宣传</p>
    </div>

    <div class="container">
      <div class="card" style="max-width:400px;margin:0 auto;">
        <!-- Tab 切换 -->
        <div style="display:flex;margin-bottom:20px;border-bottom:2px solid var(--bg);">
          <button class="tab-btn active" id="tab-login" onclick="switchTab('login')" style="flex:1;padding:12px;border:none;background:none;font-size:1rem;font-weight:600;color:var(--primary);border-bottom:2px solid var(--primary);margin-bottom:-2px;cursor:pointer;">登录</button>
          <button class="tab-btn" id="tab-register" onclick="switchTab('register')" style="flex:1;padding:12px;border:none;background:none;font-size:1rem;color:var(--muted);margin-bottom:-2px;cursor:pointer;">注册</button>
        </div>

        <!-- 登录表单 -->
        <div id="login-form">
          <div class="form-group">
            <label class="form-label">手机号</label>
            <input type="tel" class="form-input" id="login-phone" placeholder="请输入手机号" maxlength="11">
          </div>
          <div class="form-group">
            <label class="form-label">密码</label>
            <input type="password" class="form-input" id="login-password" placeholder="请输入密码">
          </div>
          <button class="btn btn-primary btn-block" onclick="doLogin()">登录</button>
        </div>

        <!-- 注册表单 -->
        <div id="register-form" class="hidden">
          <div class="form-group">
            <label class="form-label">手机号 <span style="color:#e74c3c;">*</span></label>
            <input type="tel" class="form-input" id="reg-phone" placeholder="请输入手机号" maxlength="11">
          </div>
          <div class="form-group">
            <label class="form-label">密码 <span style="color:#e74c3c;">*</span></label>
            <input type="password" class="form-input" id="reg-password" placeholder="请设置密码（至少6位）">
          </div>
          <div class="form-group">
            <label class="form-label">姓名 <span style="color:#e74c3c;">*</span></label>
            <input type="text" class="form-input" id="reg-name" placeholder="请输入姓名">
          </div>
          <div class="form-group">
            <label class="form-label">学校 <span style="color:#e74c3c;">*</span></label>
            <input type="text" class="form-input" id="reg-school" placeholder="请输入学校名称">
          </div>
          <div style="display:flex;gap:8px;">
            <div class="form-group" style="flex:1;">
              <label class="form-label">年级 <span style="color:#e74c3c;">*</span></label>
              <select class="form-input" id="reg-grade">
                <option value="">请选择</option>
                <option value="一年级">一年级</option>
                <option value="二年级">二年级</option>
                <option value="三年级">三年级</option>
                <option value="四年级">四年级</option>
                <option value="五年级">五年级</option>
                <option value="六年级">六年级</option>
                <option value="七年级">七年级（初一）</option>
                <option value="八年级">八年级（初二）</option>
                <option value="九年级">九年级（初三）</option>
                <option value="十年级">十年级（高一）</option>
                <option value="十一年级">十一年级（高二）</option>
                <option value="十二年级">十二年级（高三）</option>
              </select>
            </div>
            <div class="form-group" style="flex:1;">
              <label class="form-label">班级 <span style="color:#e74c3c;">*</span></label>
              <select class="form-input" id="reg-class">
                <option value="">请选择</option>
                <option value="1班">1班</option>
                <option value="2班">2班</option>
                <option value="3班">3班</option>
                <option value="4班">4班</option>
                <option value="5班">5班</option>
                <option value="6班">6班</option>
                <option value="7班">7班</option>
                <option value="8班">8班</option>
                <option value="9班">9班</option>
                <option value="10班">10班</option>
                <option value="11班">11班</option>
                <option value="12班">12班</option>
              </select>
            </div>
          </div>
          <button class="btn btn-primary btn-block" onclick="doRegister()">注册</button>
        </div>
      </div>
    </div>
  </div>

  <script src="js/app.js"></script>
  <script>
    // 如果已登录，直接跳转首页
    if (Auth.isLoggedIn()) {
      location.href = 'index.html';
    }

    function switchTab(tab) {
      const loginForm = document.getElementById('login-form');
      const registerForm = document.getElementById('register-form');
      const tabLogin = document.getElementById('tab-login');
      const tabRegister = document.getElementById('tab-register');

      if (tab === 'login') {
        loginForm.classList.remove('hidden');
        registerForm.classList.add('hidden');
        tabLogin.style.color = 'var(--primary)';
        tabLogin.style.borderBottom = '2px solid var(--primary)';
        tabRegister.style.color = 'var(--muted)';
        tabRegister.style.borderBottom = 'none';
      } else {
        loginForm.classList.add('hidden');
        registerForm.classList.remove('hidden');
        tabRegister.style.color = 'var(--primary)';
        tabRegister.style.borderBottom = '2px solid var(--primary)';
        tabLogin.style.color = 'var(--muted)';
        tabLogin.style.borderBottom = 'none';
      }
    }

    async function doLogin() {
      const phone = document.getElementById('login-phone').value.trim();
      const password = document.getElementById('login-password').value;

      if (!phone || !password) {
        Utils.showToast('请输入手机号和密码', 'error');
        return;
      }

      try {
        const data = await API.post('/api/login', { phone, password });
        Auth.saveLogin(data.token, data.user);
        Utils.showToast('登录成功！');
        setTimeout(() => location.href = 'index.html', 500);
      } catch (e) {
        Utils.showToast(e.message || '登录失败', 'error');
      }
    }

    async function doRegister() {
      const phone = document.getElementById('reg-phone').value.trim();
      const password = document.getElementById('reg-password').value;
      const name = document.getElementById('reg-name').value.trim();
      const school = document.getElementById('reg-school').value.trim();
      const grade = document.getElementById('reg-grade').value.trim();
      const cls = document.getElementById('reg-class').value.trim();

      if (!phone || !password || !name || !school || !grade || !cls) {
        Utils.showToast('请填写完整信息', 'error');
        return;
      }
      if (!/^1[3-9]\d{9}$/.test(phone)) {
        Utils.showToast('请输入正确的手机号', 'error');
        return;
      }
      if (password.length < 6) {
        Utils.showToast('密码至少6位', 'error');
        return;
      }

      try {
        const data = await API.post('/api/register', { phone, password, name, school, grade, class: cls });
        Auth.saveLogin(data.token, data.user);
        Utils.showToast('注册成功！');
        setTimeout(() => location.href = 'index.html', 500);
      } catch (e) {
        Utils.showToast(e.message || '注册失败', 'error');
      }
    }
  </script>
</body>
</html>
