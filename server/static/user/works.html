<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>作品征集 - 健康成长互动平台</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-content">
    <div class="header">
      <h1>🎨 作品征集</h1>
      <p>展示你的健康主题创意作品</p>
    </div>

    <div class="container">
      <!-- 操作按钮 -->
      <div style="display:flex;gap:12px;margin-bottom:16px;">
        <a href="works-submit.html" class="btn btn-primary" style="flex:1;">
          📤 提交作品
        </a>
        <a href="works-winners.html" class="btn btn-accent" style="flex:1;">
          🏆 获奖名单
        </a>
      </div>

      <!-- 活动介绍 -->
      <div class="card">
        <div class="card-title">📋 活动说明</div>
        <div class="text-sm text-muted">
          <p class="mb-1">1. 围绕"健康生活"主题创作作品</p>
          <p class="mb-1">2. 支持图片（最多6张）和文字介绍</p>
          <p class="mb-1">3. 每人每天可投3票</p>
          <p>4. 票数最高的作品将获得奖励</p>
        </div>
      </div>

      <!-- 作品列表 -->
      <div id="works-list"></div>

      <!-- 加载更多 -->
      <div class="text-center mt-2">
        <button class="btn btn-outline" id="load-more" onclick="loadMore()">加载更多</button>
      </div>
    </div>
  </div>

  <div id="nav-bottom"></div>

  <script src="js/app.js"></script>
  <script>
    let currentPage = 1;
    const pageSize = 10;
    let isLoading = false;
    let hasMore = true;

    async function loadWorks() {
      if (isLoading || !hasMore) return;
      isLoading = true;
      document.getElementById('load-more').textContent = '加载中...';

      try {
        const data = await API.get(`/api/works?page=${currentPage}&limit=${pageSize}`);
        const container = document.getElementById('works-list');

        if (data.works.length === 0 && currentPage === 1) {
          container.innerHTML = '<div class="card text-center text-muted">暂无作品，快来投稿吧！</div>';
          document.getElementById('load-more').classList.add('hidden');
          return;
        }

        data.works.forEach(work => {
          const card = createWorkCard(work);
          container.appendChild(card);
        });

        if (data.works.length < pageSize) {
          hasMore = false;
          document.getElementById('load-more').classList.add('hidden');
        }

        currentPage++;
      } catch (err) {
        Utils.showToast('加载失败', 'error');
      } finally {
        isLoading = false;
        document.getElementById('load-more').textContent = '加载更多';
      }
    }

    function createWorkCard(work) {
      const div = document.createElement('div');
      div.className = 'work-card fade-in';
      
      const imageHtml = work.images && work.images.length > 0 
        ? `<img src="${work.images[0]}" class="work-image" alt="${work.title}" onclick="showImage('${work.images[0]}')">`
        : `<div style="height:200px;background:var(--bg);display:flex;align-items:center;justify-content:center;color:var(--muted);">暂无图片</div>`;

      div.innerHTML = `
        ${imageHtml}
        <div class="work-info">
          <div class="work-title">${work.title}</div>
          <p class="text-sm text-muted mb-2">${work.description || '暂无描述'}</p>
          <div class="work-meta">
            <span>${work.author_name || '匿名'} · ${work.school || '未知学校'}</span>
            <span class="work-votes" onclick="voteWork(${work.id}, this)">
              ❤️ <span class="vote-count">${work.votes}</span>
            </span>
          </div>
        </div>
      `;
      return div;
    }

    async function voteWork(workId, element) {
      try {
        const result = await API.post(`/api/works/${workId}/vote`, {
          openid: Auth.getOpenid()
        });
        
        const countEl = element.querySelector('.vote-count');
        countEl.textContent = parseInt(countEl.textContent) + 1;
        element.style.color = 'var(--error)';
        Utils.showToast(`投票成功！今日还剩${result.remaining}票`);
      } catch (err) {
        if (err.message) {
          Utils.showToast(err.message, 'error');
        } else {
          Utils.showToast(err.message || '投票失败', 'error');
        }
      }
    }

    function showImage(src) {
      const overlay = document.createElement('div');
      overlay.className = 'modal-overlay';
      overlay.style.background = 'rgba(0,0,0,0.9)';
      overlay.innerHTML = `
        <img src="${src}" style="max-width:95%;max-height:90%;border-radius:8px;" onclick="event.stopPropagation()">
      `;
      overlay.onclick = () => overlay.remove();
      document.body.appendChild(overlay);
    }

    function loadMore() {
      loadWorks();
    }

    initApp();
    loadWorks();
  </script>
</body>
</html>
