<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>获奖名单 - 健康成长互动平台</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-content">
    <div class="header">
      <h1>🏆 获奖名单</h1>
      <p>恭喜获奖的同学们</p>
    </div>

    <div class="container">
      <!-- 作品获奖 -->
      <div class="card">
        <div class="card-title">🎨 作品征集获奖</div>
        <div id="works-winners">
          <p class="text-muted">加载中...</p>
        </div>
      </div>
    </div>
  </div>

  <div id="nav-bottom"></div>

  <script src="js/app.js"></script>
  <script>
    async function loadWorksWinners() {
      try {
        const winners = await API.get('/api/works/winners');
        const container = document.getElementById('works-winners');
        
        if (winners.length === 0) {
          container.innerHTML = '<p class="text-muted">暂无获奖记录，敬请期待</p>';
          return;
        }

        container.innerHTML = winners.map((w, i) => `
          <div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--rule);${i === winners.length - 1 ? 'border-bottom:none;' : ''}">
            <div style="display:flex;align-items:center;gap:12px;">
              <div style="font-size:1.5rem;">${i < 3 ? ['🥇','🥈','🥉'][i] : (i + 1)}</div>
              <div>
                <div style="font-weight:600;">${w.title}</div>
                <div class="text-sm text-muted">${w.author_name || '匿名'} · ${w.school || '未知学校'}</div>
              </div>
            </div>
            <div class="work-votes">
              ❤️ ${w.votes}
            </div>
          </div>
        `).join('');
      } catch (err) {
        document.getElementById('works-winners').innerHTML = '<p class="text-muted">加载失败</p>';
      }
    }

    initApp();
    loadWorksWinners();
  </script>
</body>
</html>
