<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我的奖品 - 健康成长互动平台</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <div class="page-header">
      <h1>🎁 我的奖品</h1>
      <p class="text-muted">查看你的中奖记录和领奖状态</p>
    </div>

    <div id="prizes-list"></div>

    <div id="empty-state" class="hidden" style="text-align:center;padding:60px 20px;">
      <div style="font-size:4rem;">🎁</div>
      <p class="text-muted" style="margin-top:12px;">暂无中奖记录</p>
      <a href="quiz.html" class="btn btn-primary mt-2">去答题赢奖品</a>
    </div>
  </div>

  <div id="nav-bottom"></div>

  <script src="js/app.js"></script>
  <script>
    const statusMap = {
      'pending': { label: '待核销', color: '#ff9800', bg: '#fff3e0' },
      'claimed': { label: '已核销', color: '#4caf50', bg: '#e8f5e9' },
      'rejected': { label: '已拒绝', color: '#f44336', bg: '#ffebee' }
    };

    async function loadMyPrizes() {
      try {
        const records = await API.get(`/api/my-prizes?openid=${Auth.getOpenid()}`);
        const list = document.getElementById('prizes-list');
        const empty = document.getElementById('empty-state');

        if (records.length === 0) {
          empty.classList.remove('hidden');
          return;
        }

        list.innerHTML = records.map(r => {
          const s = statusMap[r.prize_status] || statusMap['pending'];
          return `
          <div class="card fade-in" style="margin-bottom:12px;">
            <div style="display:flex;justify-content:space-between;align-items:center;">
              <div>
                <div style="font-size:1.1rem;font-weight:600;">${r.prize}</div>
                <div class="text-sm text-muted" style="margin-top:4px;">中奖时间：${new Date(r.created_at).toLocaleString('zh-CN')}</div>
              </div>
              <span style="padding:4px 12px;border-radius:20px;font-size:0.85rem;font-weight:600;background:${s.bg};color:${s.color};">${s.label}</span>
            </div>
            ${r.redeem_code ? `
            <div style="margin-top:12px;padding:10px;background:var(--bg);border-radius:8px;border:1px dashed var(--primary);">
              <div class="text-sm text-muted">兑换码</div>
              <div style="font-size:1.1rem;font-weight:700;color:var(--primary);letter-spacing:2px;margin-top:4px;">${r.redeem_code}</div>
            </div>` : ''}
            ${r.prize_status === 'claimed' && r.claimed_at ? `
            <div class="text-sm text-muted" style="margin-top:8px;">核销时间：${new Date(r.claimed_at).toLocaleString('zh-CN')}</div>
            ` : ''}
            ${r.prize_status === 'pending' ? `
            <div class="text-sm" style="margin-top:8px;color:#ff9800;">请凭兑换码到指定地点领取奖品</div>
            ` : ''}
          </div>`;
        }).join('');
      } catch (err) {
        Utils.showToast('加载失败', 'error');
      }
    }

    loadMyPrizes();
  </script>
</body>
</html>
