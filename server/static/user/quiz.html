<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>健康知识答题 - 健康成长互动平台</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page-content">
    <div class="header">
      <h1>📝 健康知识答题</h1>
      <p>5道题全对即可参与抽奖</p>
    </div>

    <div class="container">
      <!-- 年级选择 -->
      <div id="grade-selection" class="fade-in">
        <div class="card">
          <div class="card-title">选择你的年级</div>
          <div class="form-group">
            <select class="form-select" id="grade-select">
              <option value="">请选择年级</option>
              <option value="primary_low">小学低年级（1-3年级）</option>
              <option value="primary_high">小学高年级（4-6年级）</option>
              <option value="middle">初中（7-9年级）</option>
              <option value="high">高中（10-12年级）</option>
            </select>
          </div>
          <button class="btn btn-primary btn-block" onclick="startQuiz()">开始答题</button>
        </div>
      </div>

      <!-- 答题区域 -->
      <div id="quiz-area" class="hidden fade-in">
        <div class="card">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
            <span class="badge badge-primary">第 <span id="current-q">1</span> / <span id="total-q">5</span> 题</span>
            <span class="text-sm text-muted" id="question-type">单选题</span>
          </div>
          
          <div class="progress-bar">
            <div class="progress-fill" id="progress-bar" style="width:0%"></div>
          </div>

          <h3 style="margin:16px 0;font-size:1.1rem;" id="question-text"></h3>

          <div id="options-container"></div>
        </div>

        <button class="btn btn-primary btn-block mt-2" id="next-btn" onclick="nextQuestion()" disabled>
          下一题
        </button>
      </div>

      <!-- 结果区域 -->
      <div id="result-area" class="hidden fade-in">
        <div class="card text-center">
          <div style="font-size:4rem;margin-bottom:16px;" id="result-emoji">🎉</div>
          <h2 style="margin-bottom:8px;">答题完成！</h2>
          <p style="font-size:1.2rem;color:var(--muted);">
            答对 <strong style="color:var(--primary);" id="result-score">0</strong> / <span id="result-total">5</span> 题
          </p>
          <div id="result-message" class="mt-2"></div>
        </div>

        <!-- 抽奖区域 -->
        <div id="lottery-area" class="hidden">
          <div class="card lottery-box">
            <h3 style="margin-bottom:16px;">🎁 幸运抽奖</h3>
            <p class="text-muted" id="lottery-status">恭喜获得抽奖机会！</p>
            <div id="lottery-scroll" class="lottery-scroll hidden"></div>
            <button class="btn btn-accent btn-block mt-2" onclick="doLottery()" id="lottery-btn">
              立即抽奖
            </button>
            <div id="lottery-result" class="lottery-result hidden"></div>
          </div>
        </div>

        <!-- 身份登记 -->
        <div id="register-area" class="hidden">
          <div class="card">
            <div class="card-title">📝 身份登记</div>
            <p class="text-sm text-muted mb-2">抽中奖品的同学请填写以下信息</p>
            
            <div class="form-group">
              <label class="form-label">姓名</label>
              <input type="text" class="form-input" id="reg-name" placeholder="请输入姓名">
            </div>
            <div class="form-group">
              <label class="form-label">学校</label>
              <input type="text" class="form-input" id="reg-school" placeholder="请输入学校名称">
            </div>
            <div class="form-group">
              <label class="form-label">年级</label>
              <input type="text" class="form-input" id="reg-grade" placeholder="如：五年级">
            </div>
            <div class="form-group">
              <label class="form-label">班级</label>
              <input type="text" class="form-input" id="reg-class" placeholder="如：3班">
            </div>
            <div class="form-group">
              <label class="form-label">联系电话 <span class="text-muted text-sm">（选填，用于奖品发放通知）</span></label>
              <input type="tel" class="form-input" id="reg-phone" placeholder="请输入家长手机号" maxlength="11">
            </div>
            <button class="btn btn-primary btn-block" onclick="submitRegister()">提交登记</button>
          </div>
        </div>

        <div class="mt-2">
          <button class="btn btn-outline btn-block" onclick="location.reload()">再答一次</button>
        </div>
      </div>
    </div>
  </div>

  <div id="nav-bottom"></div>

  <script src="js/app.js"></script>
  <script>
    let questions = [];
    let currentIndex = 0;
    let answers = [];
    let selectedOptions = [];
    let category = '';

    async function startQuiz() {
      category = document.getElementById('grade-select').value;
      if (!category) {
        Utils.showToast('请选择年级', 'error');
        return;
      }

      document.getElementById('grade-selection').classList.add('hidden');
      document.getElementById('quiz-area').classList.remove('hidden');

      try {
        questions = await API.get(`/api/quiz/questions/${category}?count=5`);
        document.getElementById('total-q').textContent = questions.length;
        showQuestion();
      } catch (err) {
        Utils.showToast('加载题目失败', 'error');
      }
    }

    function showQuestion() {
      const q = questions[currentIndex];
      document.getElementById('current-q').textContent = currentIndex + 1;
      document.getElementById('question-text').textContent = q.question;
      document.getElementById('question-type').textContent = 
        q.type === 'single' ? '单选题' : q.type === 'multiple' ? '多选题' : '判断题';
      
      const progress = ((currentIndex) / questions.length) * 100;
      document.getElementById('progress-bar').style.width = progress + '%';

      const container = document.getElementById('options-container');
      container.innerHTML = '';
      
      const labels = ['A', 'B', 'C', 'D', 'E', 'F'];
      q.options.forEach((opt, i) => {
        const div = document.createElement('div');
        div.className = 'quiz-option';
        div.dataset.index = labels[i];
        div.innerHTML = `
          <span class="option-label">${labels[i]}</span>
          <span class="option-text">${opt}</span>
        `;
        div.onclick = () => selectOption(labels[i], div);
        container.appendChild(div);
      });

      selectedOptions = [];
      document.getElementById('next-btn').disabled = true;
      document.getElementById('next-btn').textContent =
        currentIndex === questions.length - 1 ? '提交答案' : '下一题';
    }

    function selectOption(index, element) {
      const q = questions[currentIndex];

      if (q.type === 'multiple') {
        // 多选题：可多选
        if (selectedOptions.includes(index)) {
          selectedOptions = selectedOptions.filter(i => i !== index);
          element.classList.remove('selected');
        } else {
          selectedOptions.push(index);
          element.classList.add('selected');
        }
        selectedOptions.sort();
        document.getElementById('next-btn').disabled = selectedOptions.length === 0;
      } else {
        // 单选题/判断题：单选
        document.querySelectorAll('.quiz-option').forEach(el => el.classList.remove('selected'));
        element.classList.add('selected');
        selectedOptions = [index];
        document.getElementById('next-btn').disabled = false;
      }
    }

    function nextQuestion() {
      if (selectedOptions.length === 0) return;

      answers.push({
        questionId: questions[currentIndex].id,
        answer: selectedOptions.join('')
      });

      currentIndex++;
      if (currentIndex < questions.length) {
        showQuestion();
      } else {
        submitQuiz();
      }
    }

    async function submitQuiz() {
      const openid = Auth.getOpenid();
      try {
        const result = await API.post('/api/quiz/submit', {
          openid,
          category,
          answers
        });

        document.getElementById('quiz-area').classList.add('hidden');
        document.getElementById('result-area').classList.remove('hidden');
        
        document.getElementById('result-score').textContent = result.score;
        document.getElementById('result-total').textContent = result.total;

        if (result.passed) {
          document.getElementById('result-emoji').textContent = '🎉';
          document.getElementById('result-message').innerHTML = 
            '<span class="badge badge-accent">恭喜！获得抽奖资格</span>';
          document.getElementById('lottery-area').classList.remove('hidden');
        } else {
          document.getElementById('result-emoji').textContent = '💪';
          document.getElementById('result-message').innerHTML =
            '<p class="text-muted">再接再厉，5题全对即可抽奖</p>';
        }
      } catch (err) {
        Utils.showToast('提交失败', 'error');
      }
    }

    async function doLottery() {
      const btn = document.getElementById('lottery-btn');
      const statusText = document.getElementById('lottery-status');
      const scrollDiv = document.getElementById('lottery-scroll');
      const resultDiv = document.getElementById('lottery-result');

      btn.disabled = true;
      btn.classList.add('btn-lottery-spin');
      statusText.textContent = '抽奖中...';
      resultDiv.classList.add('hidden');
      scrollDiv.classList.remove('hidden');

      // 奖品滚动动画
      const prizeNames = ['🎁 健康大礼包', '⌚ 运动手环', '🥤 健康水杯', '🎉 神秘大奖', '💝 谢谢参与'];
      let scrollCount = 0;
      const maxScroll = 20;

      const scrollInterval = setInterval(() => {
        const name = prizeNames[scrollCount % prizeNames.length];
        scrollDiv.innerHTML = `<span class="scroll-item">${name}</span>`;
        scrollCount++;

        if (scrollCount >= maxScroll) {
          clearInterval(scrollInterval);
        }
      }, 100);

      try {
        const result = await API.post('/api/quiz/lottery', {
          openid: Auth.getOpenid()
        });

        // 等待滚动动画完成
        await new Promise(resolve => setTimeout(resolve, maxScroll * 100 + 300));

        scrollDiv.classList.add('hidden');
        btn.classList.remove('btn-lottery-spin');
        resultDiv.classList.remove('hidden');

        if (result.prize && result.prize.name !== '谢谢参与') {
          statusText.textContent = '🎉 恭喜你中奖了！';
          resultDiv.innerHTML = `
            <div class="lottery-win">
              <div style="font-size:3rem;margin-bottom:8px;">🎁</div>
              <div>恭喜你获得</div>
              <div style="font-size:1.3rem;margin:8px 0;color:var(--accent);">${result.prize.name}</div>
              <div class="text-sm text-muted">${result.prize.description}</div>
            </div>
          `;
          document.getElementById('register-area').classList.remove('hidden');
        } else {
          statusText.textContent = '很遗憾，这次没有中奖';
          resultDiv.innerHTML = `
            <div class="lottery-win">
              <div style="font-size:3rem;margin-bottom:8px;">😊</div>
              <div>谢谢参与</div>
              <div class="text-sm text-muted">再接再厉，下次好运！</div>
            </div>
          `;
        }
      } catch (err) {
        clearInterval(scrollInterval);
        scrollDiv.classList.add('hidden');
        btn.classList.remove('btn-lottery-spin');
        statusText.textContent = '抽奖失败，请重试';
        Utils.showToast('抽奖失败', 'error');
        btn.disabled = false;
      }
    }

    async function submitRegister() {
      const name = document.getElementById('reg-name').value.trim();
      const school = document.getElementById('reg-school').value.trim();
      const grade = document.getElementById('reg-grade').value.trim();
      const className = document.getElementById('reg-class').value.trim();
      const phone = document.getElementById('reg-phone').value.trim();

      if (!name || !school || !grade || !className) {
        Utils.showToast('请填写完整信息', 'error');
        return;
      }

      if (phone && !/^1[3-9]\d{9}$/.test(phone)) {
        Utils.showToast('请输入正确的手机号', 'error');
        return;
      }

      try {
        await API.post('/api/quiz/register', {
          openid: Auth.getOpenid(),
          name,
          school,
          grade,
          class: className,
          phone
        });
        Utils.showToast('登记成功！');
        document.getElementById('register-area').innerHTML = 
          '<div class="alert alert-success">✅ 登记成功！请等待奖品发放通知。</div>';
      } catch (err) {
        Utils.showToast('登记失败', 'error');
      }
    }

    initApp();
  </script>
</body>
</html>
